<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe Ad</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ad-container">

    <div class="bg"></div>

    <div class="game-screen" id="gameScreen">

        <h1 class="title">TIC TAC TOE</h1>
        <div class="subtitle">Player X Turn</div>

        <div class="board" id="board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <button class="restart-btn">
            Restart Game
        </button>

    </div>

    <div class="cta-screen" id="ctaScreen">
        <button class="play-now" id="playNow">
            PLAY NOW
        </button>
    </div>

    <div class="mini-game hidden" id="miniGame">

        <h2>TIC TAC TOE</h2>

        <div class="board mini-board">

            <div class="cell">O</div>
            <div class="cell">X</div>
            <div class="cell">O</div>

            <div class="cell">X</div>
            <div class="cell empty" id="winningCell"></div>
            <div class="cell">O</div>

            <div class="cell">O</div>
            <div class="cell">X</div>
            <div class="cell">X</div>

        </div>

        <div class="result" id="result"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
